<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalis-ripae</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.svg" />
  <script src="script/chart.min.js"></script>
  <script src="script/chartjs-plugin-zoom.min.js"></script>
  <script src="https://code.iconify.design/1/1.0.7/iconify.min.js"></script>
</head>
<body>
  <header>
    <h1>Kalis ripae</h1>
  </header>

  <main>
    <section class="piggybank" aria-label="Savings goals">

      <!-- Add product -->
      <section aria-label="Add a new savings goal">
        <div class="add-product-form">
          <label for="product-name">Product Name:</label>
          <input type="text" id="product-name" required autocomplete="off" />

          <label for="target-amount">Target Amount:</label>
          <input type="number" id="target-amount" min="0" step="0.01" required />

          <label for="target-date">Target Date:</label>
          <input type="date" id="target-date" required />

          <button id="add-product" type="button">Add Product</button>
        </div>
      </section>

      <!-- Savings table — wrapped for horizontal scroll on small screens -->
      <section aria-label="Savings overview">
        <div class="table-scroll">
          <table id="piggybank-table">
            <thead>
              <tr>
                <th scope="col">Product</th>
                <th scope="col">Amount Saved</th>
                <th scope="col">Target</th>
                <th scope="col">Remaining</th>
                <th scope="col">Target Date</th>
                <th scope="col">Months Left</th>
                <th scope="col">Monthly Allocation</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <!-- Controls -->
      <section class="controls" aria-label="Data controls">
        <button id="save-results" type="button">Save Results</button>
        <button id="backup-data" type="button">Backup</button>

        <label for="currency-selector">Currency:</label>
        <select id="currency-selector" onchange="changeCurrency()">
          <option value="EUR">EUR</option>
          <option value="USD">USD</option>
          <option value="JPY">JPY</option>
          <option value="GBP">GBP</option>
          <option value="AUD">AUD</option>
          <option value="CAD">CAD</option>
          <option value="CHF">CHF</option>
          <option value="CNY">CNY</option>
          <option value="HKD">HKD</option>
          <option value="NZD">NZD</option>
        </select>

        <label for="chartType">Chart type:</label>
        <select id="chartType" onchange="switchChartView(document.getElementById('dataType').value, this.value)">
          <option value="bar">Bar Chart</option>
          <option value="line">Line Chart</option>
        </select>

        <label for="dataType">Data view:</label>
        <select id="dataType" onchange="switchChartView(this.value, document.getElementById('chartType').value)">
          <option value="savings">Savings</option>
          <option value="history">Historical View</option>
        </select>
      </section>

      <!-- Chart -->
      <section class="canvas" aria-label="Savings chart">
        <canvas id="piggybank-chart"></canvas>
      </section>

    </section>
  </main>

  <script src="script/script.js"></script>
</body>
</html>
